name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test
      - name: Check ESM module resolution
        run: pnpm dlx @arethetypeswrong/cli --ignore-rules cjs-resolves-to-esm --profile node16 --exclude-entrypoints "./styles/index.css" --pack
